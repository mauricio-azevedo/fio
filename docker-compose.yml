services:
  fio-postgres:
    image: postgres:17-alpine
    container_name: fio-postgres
    environment:
      POSTGRES_DB: fio
      POSTGRES_USER: fio
      POSTGRES_PASSWORD: fio_dev_password
    ports:
      - '5432:5432'
    volumes:
      - fio-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fio -d fio']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-postgres:
    image: postgres:17-alpine
    container_name: fio-keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_dev_password
    volumes:
      - fio-keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak -d keycloak']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: fio-keycloak
    command: start-dev --import-realm
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev_password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - '8080:8080'
    volumes:
      - ./infra/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro

volumes:
  fio-postgres-data:
  fio-keycloak-postgres-data:
