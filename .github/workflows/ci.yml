name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://fio:fio_dev_password@localhost:55432/fio?schema=public
      KEYCLOAK_ISSUER: http://localhost:8080/realms/fio
      KEYCLOAK_AUDIENCE: fio-api
      VITE_API_BASE_URL: http://localhost:3000/v1
      VITE_KEYCLOAK_ISSUER: http://localhost:8080/realms/fio
      VITE_OIDC_CLIENT_ID: fio-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
